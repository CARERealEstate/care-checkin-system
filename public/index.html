<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CARE Real Estate â Check-In/Out System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-c">C</span><span class="logo-a">A</span><span class="logo-r">R</span><span class="logo-e">E</span>
        </div>
        <div class="logo-tagline">Check-In/Out System</div>
      </div>
      <ul class="nav-menu">
        <li class="nav-item active" data-page="bookings"><i class="fas fa-building"></i> Bookings</li>
        <li class="nav-item" data-page="new-booking"><i class="fas fa-plus-circle"></i> New Booking</li>
        <li class="nav-item" data-page="crm-sync"><i class="fas fa-sync-alt"></i> CRM Sync</li>
      </ul>
      <div class="sidebar-footer">
        <div class="system-status" id="systemStatus">
          <i class="fas fa-circle"></i> <span>System Online</span>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content">
      <!-- Top Bar -->
      <header class="top-bar">
        <div class="search-container">
          <i class="fas fa-search"></i>
          <input type="text" id="globalSearch" placeholder="Search tenant, property, council...">
        </div>
        <div class="top-actions">
          <button class="btn btn-outline" onclick="syncCRM()"><i class="fas fa-sync-alt"></i> Sync CRM</button>
        </div>
      </header>

      <!-- Pages -->
      <div id="page-bookings" class="page active">
        <div class="page-header">
          <h2>Bookings</h2>
          <div class="filter-tabs">
            <button class="filter-tab active" data-status="all">All</button>
            <button class="filter-tab" data-status="active">Active</button>
            <button class="filter-tab" data-status="checked_in">Checked In</button>
            <button class="filter-tab" data-status="checked_out">Checked Out</button>
            <button class="filter-tab" data-status="completed">Completed</button>
          </div>
        </div>
        <div id="bookings-list" class="card-list"></div>
        <div id="bookings-pagination" class="pagination"></div>
      </div>

      <div id="page-booking-detail" class="page">
        <div id="booking-detail-content"></div>
      </div>

      <div id="page-checkin-form" class="page">
        <div id="checkin-form-content"></div>
      </div>

      <div id="page-checkout-form" class="page">
        <div id="checkout-form-content"></div>
      </div>

      <div id="page-new-booking" class="page">
        <div class="page-header"><h2>Create Manual Booking</h2></div>
        <div class="form-card">
          <form id="newBookingForm" onsubmit="createBooking(event)">
            <div class="form-grid">
              <div class="form-group">
                <label>First Name <span class="required">*</span></label>
                <input type="text" name="tenant_first_name" required>
              </div>
              <div class="form-group">
                <label>Last Name <span class="required">*</span></label>
                <input type="text" name="tenant_last_name" required>
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" name="tenant_email">
              </div>
              <div class="form-group">
                <label>Phone</label>
                <input type="text" name="tenant_phone">
              </div>
              <div class="form-group full-width">
                <label>Property Address <span class="required">*</span></label>
                <input type="text" name="property_address" required>
              </div>
              <div class="form-group">
                <label>Council Name <span class="required">*</span></label>
                <input type="text" name="council_name" required>
              </div>
              <div class="form-group">
                <label>Reference Number</label>
                <input type="text" name="reference_number">
              </div>
              <div class="form-group">
                <label>Placement Start Date</label>
                <input type="date" name="placement_start">
              </div>
              <div class="form-group">
                <label>Placement End Date</label>
                <input type="date" name="placement_end">
              </div>
              <div class="form-group">
                <label>Nightly Rate (Â£)</label>
                <input type="text" name="nightly_rate">
              </div>
              <div class="form-group">
                <label>Risk Profile</label>
                <select name="risk_profile">
                  <option value="">Select...</option>
                  <option value="Low">Low</option>
                  <option value="Medium">Medium</option>
                  <option value="High">High</option>
                </select>
              </div>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Create Booking</button>
            </div>
          </form>
        </div>
      </div>

      <div id="page-crm-sync" class="page">
        <div class="page-header"><h2>CRM Sync</h2></div>
        <div class="form-card">
          <p style="margin-bottom:16px;">Sync bookings from Sangam CRM. This runs automatically every 30 minutes, but you can trigger it manually here.</p>
          <button class="btn btn-primary" onclick="syncCRM()"><i class="fas fa-sync-alt"></i> Sync Now</button>
          <div id="sync-result" style="margin-top:16px;"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast"></div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button onclick="closeModal()" class="modal-close"><i class="fas fa-times"></i></button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/4.2.0/signature_pad.umd.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
